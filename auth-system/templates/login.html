<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="card">
    <h2>Welcome Back</h2>
    <form method="POST">
        <input type="email" name="email" placeholder="Email" required>

</div>
</body>
</html>
